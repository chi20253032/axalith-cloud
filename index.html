<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .bg-blob {
            position: fixed; width: 100vw; height: 100vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1), transparent 70%);
            z-index: -1; animation: float 15s infinite alternate;
        }
        @keyframes float { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">
    <div class="bg-blob"></div>

    <div id="panel" class="liquid-glass p-10 rounded-[40px] w-full max-w-[380px] text-center">
        <img src="./logo.png" class="w-24 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(0,242,255,0.5)]" 
             onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png'">
        
        <h1 class="text-3xl font-black tracking-tighter mb-1">Axalith Cloud</h1>
        <p class="text-[10px] text-cyan-400/50 tracking-[0.4em] uppercase mb-10">Hyper Bridge Active</p>

        <div class="space-y-4">
            <button id="google-btn" class="btn-active w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-gray-100 transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Googleでログイン</span>
            </button>

            <button id="scratch-btn" class="btn-active w-full bg-[#4d97ff] text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-[#3d87ef] transition-all">
                <img src="https://scratch.mit.edu/favicon.ico" class="w-5 h-5 rounded-md">
                <span>Scratch Auth</span>
            </button>
        </div>

        <div id="status" class="mt-8 text-[9px] font-mono text-gray-500 tracking-widest uppercase">
            Bridge: Standby
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusEl = document.getElementById('status');
        const panel = document.getElementById('panel');

        // ★パルス送信機能の完全強化版
        const sendPulse = (payload) => {
            console.log("Axalith: Attempting to send pulse...", payload);
            
            // 1. iframeとして開かれている場合（親フレームへ送信）
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(payload, "*");
                console.log("-> Pulse sent to Parent (iframe target)");
            }
            
            // 2. ポップアップや別タブとして開かれている場合（呼び出し元へ送信）
            if (window.opener && window.opener !== window) {
                window.opener.postMessage(payload, "*");
                console.log("-> Pulse sent to Opener (popup target)");
            }
        };

        document.getElementById('google-btn').onclick = async () => {
            statusEl.innerText = "AUTHENTICATING...";
            try {
                const res = await signInWithPopup(auth, provider);
                sendPulse({
                    type: "AXALITH_GOOGLE_SUCCESS",
                    value: 1,
                    userName: res.user.displayName,
                    userEmail: res.user.email,
                    userPhoto: res.user.photoURL
                });
                statusEl.innerText = "LINK_ESTABLISHED";
                panel.style.opacity = "0.3";
            } catch (err) {
                statusEl.innerText = "AUTH_ERROR: " + err.code;
            }
        };

        document.getElementById('scratch-btn').onclick = () => {
            statusEl.innerText = "SCRATCH_SYNCING...";
            sendPulse({ type: "AXALITH_AUTH_SIGNAL", value: 1 });
            
            setTimeout(() => {
                statusEl.innerText = "SIGNAL_SENT";
                panel.style.opacity = "0.3";
            }, 500);
        };
    </script>
</body>
</html>
