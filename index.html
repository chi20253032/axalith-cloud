<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud | 認証ゲートウェイ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.2);
            --scratch-color: #ffab19;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000;
            font-family: 'Inter', 'Noto Sans JP', sans-serif; color: white; overflow: hidden;
        }

        /* 豪華なクリスタルデザインを維持 */
        .container {
            width: 340px; padding: 40px;
            background: var(--glass); backdrop-filter: blur(40px) saturate(210%);
            -webkit-backdrop-filter: blur(40px) saturate(210%);
            border: 1px solid var(--border); border-radius: 32px;
            text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .logo-area img { width: 120px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--neon-cyan)); }
        h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .subtitle { font-size: 0.7rem; opacity: 0.5; margin-bottom: 30px; letter-spacing: 1px; }

        .btn {
            width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-google { background: #fff; color: #000; }
        .btn-scratch { display: none; background: var(--scratch-color); color: white; }
        
        #status-msg { margin-top: 15px; font-size: 0.8rem; color: var(--neon-cyan); display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png" alt="Axalith Logo" onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/master/logo.png'">
        </div>

        <h1 id="main-title">AXALITH CLOUD</h1>
        <p class="subtitle" id="sub-title">AUTHENTICATION SERVER</p>

        <button class="btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Googleでサインイン
        </button>

        <button class="btn btn-scratch" id="scratch-auth">Scratch Authで連携</button>
        
        <p id="status-msg">処理中...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://cdn.skypack.dev/firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://cdn.skypack.dev/firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const googleBtn = document.getElementById('google-login');
        const scratchBtn = document.getElementById('scratch-auth');
        const statusMsg = document.getElementById('status-msg');

        // --- 1. Googleログイン後の自動終了 ---
        googleBtn.onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                // ログイン成功したらメッセージを出して少し待ってから閉じる（任意）
                statusMsg.style.display = "block";
                statusMsg.innerText = "Google認証成功。Scratch連携へ移ります...";
            } catch (e) {
                alert("Auth Error: " + e.message);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                googleBtn.style.display = "none";
                scratchBtn.style.display = "flex";
                document.getElementById('main-title').innerText = user.displayName;
            }
        });

        // --- 2. Scratch Auth 連携 ---
        scratchBtn.onclick = () => {
            // リダイレクト先をこのページ自身にする
            const redirect = btoa(window.location.href.split('?')[0]);
            window.location.href = `https://auth.itinerary.is/auth/?redirect=${redirect}`;
        };

        // --- 3. コードを取得したら PenguinMod に送ってウィンドウを閉じる ---
        const code = new URLSearchParams(window.location.search).get('privateCode');
        if (code) {
            statusMsg.style.display = "block";
            statusMsg.innerText = "連携完了。システムへ戻ります...";

            // PenguinMod (親ウィンドウ) にコードを送信
            if (window.opener) {
                window.opener.postMessage({ type: 'SCRATCH_AUTH', code: code }, "*");
            }

            // 1.5秒後に自動でウィンドウを閉じる
            setTimeout(() => {
                window.close();
            }, 1500);
        }
    </script>
</body>
</html>
