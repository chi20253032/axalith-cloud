<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith Cloud | Portal</title>
    <style>
        /* --- Axalith Crystal UI --- */
        :root {
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            --prism-edge: rgba(255, 255, 255, 0.4);
            --neon-blue: #00d4ff;
        }

        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', sans-serif; overflow: hidden; color: white;
        }

        .crystal-panel {
            position: relative; width: 360px; padding: 3rem;
            background: var(--glass-bg); backdrop-filter: blur(35px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid var(--prism-edge);
            border-radius: 28px; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            text-align: center; animation: floating 8s infinite ease-in-out;
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 { font-weight: 200; letter-spacing: 8px; margin-bottom: 2.5rem; }

        .auth-btn {
            width: 100%; padding: 14px; margin: 10px 0;
            border: none; border-radius: 12px; font-weight: 700;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-google { background: white; color: #444; }
        .btn-google:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

        .btn-other { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="crystal-panel">
        <h1>AXALITH</h1>
        
        <button class="auth-btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Googleで接続
        </button>

        <button class="auth-btn btn-other" id="scratch-btn">Scratch Auth (Coming Soon)</button>
        <button class="auth-btn btn-other" id="pm-btn">PenguinMod ID (Coming Soon)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 代表の最新Config
        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c",
            measurementId: "G-76RMP31JB7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const googleProvider = new GoogleAuthProvider();

        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                alert(`${result.user.displayName}様、Axalith Cloudへようこそ！`);
                console.log("認証成功:", result.user);
            } catch (error) {
                console.error("エラー詳細:", error);
                alert("ログインに失敗しました: " + error.message);
            }
        };
    </script>
</body>
</html>
