<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith Cloud Neural-Interface v4.9 [Ultimate Edition]</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --glow: #00f2ff;
            --bg: #000;
            --liquid-glass: rgba(0, 242, 255, 0.08);
            --border: rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* 重厚な背景演出 */
        .plasma-field {
            position: fixed; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, #002222 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, #110022 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #000 0%, #001111 100%);
            z-index: -1;
        }

        .container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; transform-style: preserve-3d;
        }

        /* 液体ガラス質感パネル */
        .glass-panel {
            background: var(--liquid-glass);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 70px;
            width: 480px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 30px rgba(0, 242, 255, 0.15);
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        h1 {
            font-size: 3rem; font-weight: 100; letter-spacing: 18px;
            margin-bottom: 50px; text-shadow: 0 0 40px var(--glow);
            text-transform: uppercase;
        }

        .button-cluster { display: flex; flex-direction: column; gap: 25px; }

        button {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            color: #fff; padding: 25px; border-radius: 30px;
            font-size: 1rem; font-weight: 900; letter-spacing: 5px;
            cursor: pointer; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative; overflow: hidden;
        }

        button:hover {
            background: var(--glow); color: #000;
            box-shadow: 0 0 60px var(--glow);
            transform: scale(1.03) translateY(-8px);
        }

        #ui-dash { display: none; }
        .data-display {
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
            margin: 40px 0;
        }
        .data-card {
            background: rgba(0, 242, 255, 0.05);
            padding: 25px; border-radius: 25px; border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px; letter-spacing: 2px; }
        .val { font-size: 1.6rem; font-weight: 900; color: var(--glow); }
        .status-bar { margin-top: 30px; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="plasma-field"></div>
    <div class="container">
        <div class="glass-panel" id="core-card">
            <h1 id="main-title">AXALITH</h1>
            
            <div id="ui-gate" class="button-cluster">
                <button onclick="Portal.google()">CONNECT GOOGLE</button>
                <button onclick="Portal.sendPulse('TRIGGER_SCRATCH_AUTH')">CONNECT SCRATCH</button>
            </div>

            <div id="ui-dash">
                <div id="user-tag" style="font-size: 2rem; font-weight: 900; margin-bottom: 30px;">---</div>
                <div class="data-display">
                    <div class="data-card">
                        <div class="label">CREDITS</div>
                        <div class="val" id="val-credit">0</div>
                    </div>
                    <div class="data-card">
                        <div class="label">RANK</div>
                        <div class="val" id="val-rank">---</div>
                    </div>
                </div>
            </div>

            <div id="status-text" class="status-bar">SYSTEM INITIALIZED</div>
        </div>
    </div>

    <script>
        const config = { 
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c", 
            authDomain: "axalith-cloud.firebaseapp.com", 
            projectId: "axalith-cloud" 
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const Portal = {
            query: new URLSearchParams(window.location.search),
            init() {
                const mode = this.query.get('mode');
                if (mode) {
                    document.getElementById('ui-gate').style.display = 'none';
                    document.getElementById('ui-dash').style.display = 'block';
                    document.getElementById('main-title').innerText = "DASHBOARD";
                    document.getElementById('user-tag').innerText = (this.query.get('name') || this.query.get('user')).toUpperCase();
                    
                    window.parent.postMessage({ type: 'AXALITH_AUTH_FINAL', authType: mode, uid: this.query.get('uid'), user: this.query.get('user') }, '*');
                    
                    const id = this.query.get('uid') || this.query.get('user');
                    db.collection('users').doc(id).onSnapshot(doc => {
                        if (doc.exists) {
                            document.getElementById('val-credit').innerText = doc.data().credit;
                            document.getElementById('val-rank').innerText = doc.data().rank;
                        }
                    });
                }
            },
            async google() {
                const r = await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
                this.redirect({ mode: 'GOOGLE', uid: r.user.uid, name: r.user.displayName });
            },
            sendPulse(label) {
                window.parent.postMessage({ type: 'AXALITH_PULSE', label: label }, '*');
                document.getElementById('status-text').innerText = "SIGNAL DISPATCHED: " + label;
            },
            redirect(q) {
                document.getElementById('core-card').style.opacity = '0';
                document.getElementById('core-card').style.transform = 'scale(1.1)';
                setTimeout(() => { window.location.search = new URLSearchParams(q).toString(); }, 800);
            }
        };

        // 拡張機能からの「ゲート開放」命令を受信
        window.addEventListener('message', e => {
            if (e.data.type === 'NAVIGATE_DASHBOARD') {
                Portal.redirect({ mode: 'SCRATCH', user: e.data.user });
            }
        });

        Portal.init();
    </script>
</body>
</html>
