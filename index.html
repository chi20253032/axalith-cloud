<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axalith Cloud Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: #050505;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: white;
        }

        /* Liquid Glass アニメーション背景 */
        .glass-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.15) 0%, rgba(0, 102, 255, 0.15) 100%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .btn-expressive {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-expressive:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        /* フェードアウト用アニメーション */
        .fade-out {
            opacity: 0;
            transform: scale(1.1);
            transition: all 0.8s ease-in-out;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="glass-bg">
        <div class="blob" style="top: -10%; left: -10%;"></div>
        <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s; background: linear-gradient(135deg, rgba(255, 0, 255, 0.1) 0%, rgba(0, 102, 255, 0.1) 100%);"></div>
    </div>

    <div id="app-container" class="w-full h-full flex flex-col items-center justify-center p-6 text-center">
        
        <div class="mb-10 relative">
            <div class="absolute inset-0 bg-cyan-500/20 blur-3xl rounded-full"></div>
            <img src="./logo.png" alt="Axalith" class="relative w-48 h-auto drop-shadow-[0_0_25px_rgba(0,242,255,0.6)] animate-pulse"
                 onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png'">
        </div>

        <div class="glass-panel p-10 rounded-[40px] max-w-md w-full border-t border-white/20">
            <h1 class="text-4xl font-extrabold mb-2 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                Axalith Cloud
            </h1>
            <p class="text-cyan-400/80 text-sm font-light mb-8 tracking-[0.2em] uppercase">Gateway System v2.0</p>

            <button id="google-login" class="btn-expressive w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-4 hover:bg-cyan-50">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 h-6" alt="Google">
                <span>Googleでログイン</span>
            </button>

            <div class="mt-8 pt-6 border-t border-white/5 text-[10px] text-gray-500 uppercase tracking-widest">
                Protected by Axalith Security
            </div>
        </div>

        <div id="status" class="mt-6 text-sm text-cyan-500/50 font-mono">SYSTEM: READY_TO_LINK</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('google-login');
        const statusText = document.getElementById('status');
        const container = document.getElementById('app-container');

        loginBtn.addEventListener('click', async () => {
            statusText.innerText = "SYSTEM: AUTHENTICATING...";
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                statusText.innerText = "SYSTEM: SUCCESS - SENDING DATA";
                
                // PenguinModへデータを送信
                const messageData = {
                    type: "AXALITH_GOOGLE_SUCCESS",
                    userName: user.displayName,
                    userEmail: user.email,
                    userPhoto: user.photoURL,
                    uid: user.uid
                };
                
                window.parent.postMessage(messageData, "*");

                // 演出: フェードアウトしてから閉じる
                container.classList.add('fade-out');
                setTimeout(() => {
                    // 自動で閉じない場合はPenguinMod側でiframeを非表示にすることを推奨
                    console.log("Login complete, data sent.");
                }, 800);

            } catch (error) {
                console.error(error);
                statusText.innerText = "SYSTEM: ERROR - " + error.code;
                alert("ログインエラーが発生しました。");
            }
        });
    </script>
</body>
</html>
