<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith OS - Login Gateway</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body style="background: #000; color: #00f2ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <h1>Axalith OS Gateway</h1>
    <div id="status">システム待機中...</div>
    <button id="google-login" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">Googleで連携・ログイン</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };
        firebase.initializeApp(firebaseConfig);

        const provider = new firebase.auth.GoogleAuthProvider();

        document.getElementById('google-login').onclick = () => {
            const user = firebase.auth().currentUser;

            if (user) {
                // すでにログイン（Scratch等）している場合は「リンク」
                user.linkWithPopup(provider).then((result) => {
                    sendToDashboard(result.user, true);
                }).catch((error) => {
                    // すでにGoogle垢がある場合は普通にサインイン
                    firebase.auth().signInWithPopup(provider).then((result) => {
                        sendToDashboard(result.user, false);
                    });
                });
            } else {
                firebase.auth().signInWithPopup(provider).then((result) => {
                    sendToDashboard(result.user, false);
                });
            }
        };

        function sendToDashboard(user, isLinked) {
            document.getElementById('status').innerText = "認証成功。ダッシュボードへ転送中...";
            // UIDと連携フラグをURLパラメータに付与
            setTimeout(() => {
                window.location.href = `dashboard.html?uid=${user.uid}&name=${encodeURIComponent(user.displayName)}&photo=${encodeURIComponent(user.photoURL)}&linked=${isLinked}`;
            }, 1000);
        }
    </script>
</body>
</html>
