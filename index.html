<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud | Bridge Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.2);
            --scratch-color: #ffab19;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 114, 255, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 45%);
            font-family: 'Inter', 'Noto Sans JP', sans-serif; color: white; overflow: hidden;
        }

        /* 削らせない：動くグリッドアニメーション */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-20%);
            animation: grid-move 20s linear infinite; z-index: -1;
        }
        @keyframes grid-move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        .container {
            position: relative; width: 320px; padding: 50px 40px;
            background: var(--glass); backdrop-filter: blur(50px) saturate(210%);
            -webkit-backdrop-filter: blur(50px) saturate(210%);
            border: 1px solid var(--border); border-radius: 40px;
            text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .logo-area img { 
            width: 140px; height: auto; margin-bottom: 25px; 
            filter: drop-shadow(0 0 20px var(--neon-cyan)); 
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 1.6rem; font-weight: 700; margin: 0; letter-spacing: 2px; }
        .subtitle { font-size: 0.75rem; opacity: 0.5; margin-bottom: 35px; }

        .btn {
            width: 100%; padding: 18px; margin-top: 15px; border: none; border-radius: 20px;
            font-weight: 700; cursor: pointer; transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-transform: uppercase;
        }

        .btn-google { background: #fff; color: #000; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-google:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,255,255,0.2); }

        .btn-scratch { background: var(--scratch-color); color: white; box-shadow: 0 10px 30px rgba(255, 171, 25, 0.3); }
        .btn-scratch:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255, 171, 25, 0.4); }
        
        #status-msg { margin-top: 20px; font-size: 0.8rem; color: var(--neon-cyan); min-height: 1.2em; text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png" alt="Axalith Logo" onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/master/logo.png'">
        </div>

        <h1>AXALITH CLOUD</h1>
        <p class="subtitle">AUTHENTICATION BRIDGE</p>

        <button class="btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Google Sign-in
        </button>

        <button class="btn btn-scratch" id="scratch-auth">
            Scratch Auth
        </button>
        
        <p id="status-msg"></p>
    </div>

    <script type="module">
        // 404エラー対策をしつつ、最新SDKを使用
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusMsg = document.getElementById('status-msg');

        // 共通信号送信関数
        const sendSignal = (type, val) => {
            const target = window.parent || window.opener;
            if (target) {
                target.postMessage({ type, value: val }, "*");
            }
        };

        // --- 1. Googleログイン ---
        document.getElementById('google-login').onclick = async () => {
            try {
                statusMsg.innerText = "AUTH_PROCESS: STARTING...";
                const result = await signInWithPopup(auth, provider);
                
                // Google認証完了信号を0.5秒送出
                sendSignal('AXALITH_GOOGLE_SUCCESS', 1);
                statusMsg.innerText = "GOOGLE_AUTH: SUCCESS";

                setTimeout(() => {
                    sendSignal('AXALITH_GOOGLE_SUCCESS', 0);
                    statusMsg.innerText = "CLOSING BRIDGE...";
                    // 信号リセット後にタブを閉じる
                    if (window.opener) window.close();
                }, 500);

            } catch (e) {
                statusMsg.innerText = "ERROR: " + e.message;
            }
        };

        // --- 2. Scratch Auth ---
        document.getElementById('scratch-auth').onclick = () => {
            statusMsg.innerText = "SIGNAL: CALLING SCRATCH...";
            
            // Auth呼び出し信号を0.5秒送出
            sendSignal('AXALITH_AUTH_SIGNAL', 1);

            setTimeout(() => {
                sendSignal('AXALITH_AUTH_SIGNAL', 0);
                statusMsg.innerText = "SIGNAL: RESET (0)";
            }, 500);
        };
    </script>
</body>
</html>
