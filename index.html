<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud | Bridge Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-cyan': '#00f2ff',
                        'neon-blue': '#0072ff',
                        'scratch': '#ffab19',
                    },
                    animation: {
                        'grid-move': 'grid-move 20s linear infinite',
                        'float': 'float 4s infinite ease-in-out',
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        /* Tailwindで表現しきれない高度な背景エフェクトを維持 */
        .bg-grid {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-20%);
        }

        @keyframes grid-move { 
            from { transform: perspective(500px) rotateX(60deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); } 
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(50px) saturate(210%);
            -webkit-backdrop-filter: blur(50px) saturate(210%);
        }
    </style>
</head>
<body class="bg-black m-0 p-0 h-screen flex justify-center items-center font-['Inter','Noto_Sans_JP',sans-serif] text-white overflow-hidden relative">

    <div class="absolute inset-0 z-[-1] overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_10%_20%,rgba(0,114,255,0.2)_0%,transparent_45%),radial-gradient(circle_at_90%_80%,rgba(0,242,255,0.15)_0%,transparent_45%)]"></div>
        <div class="bg-grid absolute w-[200%] h-[200%] animate-grid-move"></div>
    </div>

    <div class="container relative w-[340px] px-10 py-12 glass-effect border border-white/20 rounded-[40px] text-center shadow-[0_40px_100px_rgba(0,0,0,0.8)]">
        
        <div class="logo-area mb-6">
            <img src="https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png" 
                 alt="Axalith Logo" 
                 class="w-[140px] h-auto mx-auto drop-shadow-[0_0_20px_rgba(0,242,255,0.8)] animate-float"
                 onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/master/logo.png'">
        </div>

        <h1 class="text-[1.6rem] font-bold m-0 tracking-[2px]">AXALITH CLOUD</h1>
        <div class="subtitle text-[0.75rem] font-['JetBrains_Mono'] opacity-50 mb-9 leading-tight">
            認証ブリッジゲートウェイ<br>
            <span class="text-[0.6rem] opacity-50">AUTHENTICATION BRIDGE</span>
        </div>

        <button id="google-login" class="btn w-full p-[18px] mt-4 border-none rounded-[20px] font-bold text-[0.95rem] cursor-pointer transition-all duration-400 flex items-center justify-center gap-3 tracking-wider bg-white text-black hover:-translate-y-1 hover:shadow-[0_15px_40px_rgba(255,255,255,0.2)]">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            <div class="flex flex-col items-center">
                <span>Googleでログイン</span>
                <span class="text-[0.6rem] opacity-70 font-normal">Sign-in with Google</span>
            </div>
        </button>

        <button id="scratch-auth" class="btn w-full p-[18px] mt-4 border-none rounded-[20px] font-bold text-[0.95rem] cursor-pointer transition-all duration-400 flex items-center justify-center gap-3 tracking-wider bg-scratch text-white hover:-translate-y-1 hover:shadow-[0_15px_40px_rgba(255,171,25,0.4)]">
            <div class="flex flex-col items-center">
                <span>Scratchを連携</span>
                <span class="text-[0.6rem] opacity-70 font-normal">Link Scratch ID</span>
            </div>
        </button>
        
        <p id="status-msg" class="mt-5 text-[0.8rem] text-neon-cyan min-h-[1.2em] [text-shadow:0_0_10px_#00f2ff] font-['JetBrains_Mono']"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusMsg = document.getElementById('status-msg');

        const sendPulse = (type, data = {}) => {
            const target = window.parent || window.opener;
            if (target) {
                console.log(`[Axalith Signal] HIGH (1) -> ${type}`);
                target.postMessage({ type, value: 1, ...data }, "*");
                setTimeout(() => {
                    console.log(`[Axalith Signal] LOW (0) -> ${type}`);
                    target.postMessage({ type, value: 0 }, "*");
                }, 500);
            }
        };

        document.getElementById('google-login').onclick = async () => {
            try {
                statusMsg.innerText = "認証中... / AUTHENTICATING...";
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                statusMsg.innerText = "認証成功 / GOOGLE_SUCCESS";
                sendPulse('AXALITH_GOOGLE_SUCCESS', {
                    userName: user.displayName,
                    userEmail: user.email,
                    userPhoto: user.photoURL
                });

                setTimeout(() => {
                    if (window.opener) window.close();
                }, 1000);
            } catch (e) {
                statusMsg.innerText = "エラー / ERROR: " + e.message;
            }
        };

        document.getElementById('scratch-auth').onclick = () => {
            statusMsg.innerText = "信号送信中... / SENDING SIGNAL...";
            sendPulse('AXALITH_AUTH_SIGNAL');
        };
    </script>
</body>
</html>
