<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith Cloud - Overload v4.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --glow: #00f2ff;
            --accent: #ff00ff;
            --bg: #000505;
            --glass: rgba(0, 242, 255, 0.05);
            --card-border: rgba(0, 242, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* 背景：動的な流体グラデーション */
        .plasma-bg {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #001a1a 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #0a001a 0%, transparent 40%);
            z-index: -1; filter: blur(50px);
        }

        .container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; perspective: 1000px;
        }

        /* Liquid Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 48px;
            padding: 60px;
            width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8),
                        inset 0 0 20px rgba(0, 242, 255, 0.1);
            animation: card-entry 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes card-entry {
            0% { opacity: 0; transform: translateZ(-200px) rotateX(20deg); }
            100% { opacity: 1; transform: translateZ(0) rotateX(0); }
        }

        h1 {
            font-size: 2.8rem; font-weight: 100; letter-spacing: 12px;
            margin-bottom: 40px; text-shadow: 0 0 30px var(--glow);
            background: linear-gradient(to right, #fff, var(--glow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-stack { display: flex; flex-direction: column; gap: 20px; }

        button {
            position: relative; overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #fff; padding: 22px; border-radius: 24px;
            font-size: 1rem; font-weight: 900; letter-spacing: 4px;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        button::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.2), transparent);
            transition: 0.5s;
        }

        button:hover {
            background: var(--glow); color: #000;
            box-shadow: 0 0 50px var(--glow);
            transform: scale(1.05) translateY(-5px);
        }

        button:hover::before { left: 100%; }

        .migrate-btn {
            border-color: var(--accent); color: var(--accent);
            margin-top: 30px; font-size: 0.8rem; display: none;
        }
        .migrate-btn:hover {
            background: var(--accent); color: #fff; box-shadow: 0 0 50px var(--accent);
        }

        .status-panel {
            margin-top: 40px; font-size: 0.7rem; letter-spacing: 3px;
            opacity: 0.5; text-transform: uppercase;
        }

        /* ダッシュボード表示用 */
        #ui-dash { display: none; animation: fade-in 1s ease-out; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        .data-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin: 30px 0;
        }
        .data-chip {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .label { font-size: 0.6rem; opacity: 0.6; margin-bottom: 5px; }
        .value { font-size: 1.4rem; font-weight: 900; color: var(--glow); }

    </style>
</head>
<body>
    <div class="plasma-bg"></div>
    <div class="container" id="main-view">
        <div class="glass-card">
            <h1 id="brand-title">AXALITH</h1>
            
            <div id="ui-gate" class="btn-stack">
                <button onclick="Core.login('GOOGLE')">NEURAL LINK [GOOGLE]</button>
                <button onclick="Core.pulse('TRIGGER_SCRATCH_AUTH')">PULSE LINK [SCRATCH]</button>
            </div>

            <div id="ui-dash">
                <div class="status-panel">System Authenticated</div>
                <div id="user-id-display" style="font-size: 1.8rem; margin: 15px 0; font-weight: 900;">---</div>
                
                <div class="data-box">
                    <div class="data-chip">
                        <div class="label">CREDIT BALANCE</div>
                        <div class="value" id="val-credit">0</div>
                    </div>
                    <div class="data-chip">
                        <div class="label">SECURITY RANK</div>
                        <div class="value" id="val-rank">USER</div>
                    </div>
                </div>

                <button id="btn-migrate" class="migrate-btn" onclick="Core.login('MIGRATE')">UPGRADE TO GOOGLE</button>
            </div>

            <div id="status-msg" class="status-panel">Awaiting handshake...</div>
        </div>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();

        const Core = {
            params: new URLSearchParams(window.location.search),
            
            init() {
                const mode = this.params.get('mode');
                if (mode) {
                    document.getElementById('ui-gate').style.display = 'none';
                    document.getElementById('ui-dash').style.display = 'block';
                    document.getElementById('brand-title').innerText = "CORE DASH";
                    
                    const name = this.params.get('name') || this.params.get('user');
                    document.getElementById('user-id-display').innerText = name.toUpperCase();
                    
                    if (mode === 'SCRATCH') document.getElementById('btn-migrate').style.display = 'block';

                    // 拡張機能へ通知
                    window.parent.postMessage({
                        type: 'AXALITH_AUTH_FINAL',
                        authType: mode,
                        uid: this.params.get('uid'),
                        user: this.params.get('user')
                    }, '*');

                    // リアルタイムデータ同期
                    const id = this.params.get('uid') || this.params.get('user');
                    db.collection('users').doc(id).onSnapshot(doc => {
                        if (doc.exists) {
                            document.getElementById('val-credit').innerText = doc.data().credit;
                            document.getElementById('val-rank').innerText = doc.data().rank;
                        }
                    });
                }
            },

            async login(type) {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                const u = result.user;

                if (type === 'MIGRATE') {
                    window.parent.postMessage({ type: 'AXALITH_MIGRATE', oldId: this.params.get('user'), newId: u.uid }, '*');
                }

                this.transition({ mode: 'GOOGLE', uid: u.uid, name: u.displayName });
            },

            pulse(label) {
                window.parent.postMessage({ type: 'AXALITH_PULSE', label: label }, '*');
                document.getElementById('status-msg').innerText = "PULSE EMITTED: " + label;
            },

            transition(query) {
                document.getElementById('main-view').style.opacity = '0';
                document.getElementById('main-view').style.transform = 'scale(0.9) rotateY(10deg)';
                setTimeout(() => {
                    window.location.search = new URLSearchParams(query).toString();
                }, 800);
            }
        };

        window.addEventListener('message', e => {
            if (e.data.type === 'NAVIGATE_DASHBOARD') {
                Core.transition({ mode: 'SCRATCH', user: e.data.user });
            }
        });

        Core.init();
    </script>
</body>
</html>
