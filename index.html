<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud | 認証ブリッジゲートウェイ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0072ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.2);
            --scratch-color: #ffab19;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 114, 255, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 45%);
            font-family: 'Inter', 'Noto Sans JP', sans-serif; color: white; overflow: hidden;
        }

        /* 削らせない：動くグリッドアニメーション（Alienwareスペック最適化） */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-20%);
            animation: grid-move 20s linear infinite; z-index: -1;
        }
        @keyframes grid-move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        .container {
            position: relative; width: 340px; padding: 50px 40px;
            background: var(--glass); backdrop-filter: blur(50px) saturate(210%);
            -webkit-backdrop-filter: blur(50px) saturate(210%);
            border: 1px solid var(--border); border-radius: 40px;
            text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .logo-area img { 
            width: 140px; height: auto; margin-bottom: 25px; 
            filter: drop-shadow(0 0 20px var(--neon-cyan)); 
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 1.6rem; font-weight: 700; margin: 0; letter-spacing: 2px; }
        .subtitle { font-size: 0.75rem; font-family: 'JetBrains Mono'; opacity: 0.5; margin-bottom: 35px; }

        .btn {
            width: 100%; padding: 18px; margin-top: 15px; border: none; border-radius: 20px;
            font-weight: 700; cursor: pointer; transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            letter-spacing: 1px;
        }

        /* Googleボタン：日本語メイン */
        .btn-google { background: #fff; color: #000; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-google:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,255,255,0.2); }

        /* Scratchボタン：日本語メイン */
        .btn-scratch { background: var(--scratch-color); color: white; box-shadow: 0 10px 30px rgba(255, 171, 25, 0.3); }
        .btn-scratch:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255, 171, 25, 0.4); }
        
        #status-msg { 
            margin-top: 20px; font-size: 0.8rem; color: var(--neon-cyan); min-height: 1.2em; 
            text-shadow: 0 0 10px var(--neon-cyan); font-family: 'JetBrains Mono';
        }

        .lang-sub { font-size: 0.6rem; opacity: 0.7; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png" alt="Axalith Logo" onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/master/logo.png'">
        </div>

        <h1>AXALITH CLOUD</h1>
        <p class="subtitle">認証ブリッジゲートウェイ<br><span style="font-size:0.6rem; opacity:0.5;">AUTHENTICATION BRIDGE</span></p>

        <button class="btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            <span>Googleでログイン<span class="lang-sub">Sign-in with Google</span></span>
        </button>

        <button class="btn btn-scratch" id="scratch-auth">
            <span>Scratchを連携<span class="lang-sub">Link Scratch ID</span></span>
        </button>
        
        <p id="status-msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusMsg = document.getElementById('status-msg');

        // パルス信号送信の強化 (確実に親へ届ける)
        const sendPulse = (type) => {
            const target = window.parent || window.opener;
            if (!target) {
                console.error("Target window not found!");
                return;
            }
            
            console.log(`[Axalith Signal] Sending HIGH (1) to ${type}`);
            target.postMessage({ type: type, value: 1 }, "*");

            setTimeout(() => {
                console.log(`[Axalith Signal] Sending LOW (0) to ${type}`);
                target.postMessage({ type: type, value: 0 }, "*");
            }, 500);
        };

        // --- 1. Googleログイン ---
        document.getElementById('google-login').onclick = async () => {
            try {
                statusMsg.innerText = "認証中... / AUTHENTICATING...";
                const result = await signInWithPopup(auth, provider);
                
                statusMsg.innerText = "認証成功 / GOOGLE_SUCCESS";
                sendPulse('AXALITH_GOOGLE_SUCCESS');

                setTimeout(() => {
                    statusMsg.innerText = "システム終了 / TERMINATING...";
                    if (window.opener) window.close();
                }, 1000);

            } catch (e) {
                statusMsg.innerText = "エラー / ERROR: " + e.message;
            }
        };

        // --- 2. Scratch Auth ---
        document.getElementById('scratch-auth').onclick = () => {
            statusMsg.innerText = "信号送信中... / SENDING SIGNAL...";
            sendPulse('AXALITH_AUTH_SIGNAL');
        };
    </script>
</body>
</html>
