<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith Cloud - Active</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .status-text { font-size: 1.5rem; letter-spacing: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="status-text">SYSTEM CONNECTED</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');

        // 自分がすでにiframe（拡張機能の枠）の中で動いているため、
        // 「自分（window）」または「親（window.parent）」の拡張機能に向けてパルスを送信する
        function sendPulse(data) {
            window.parent.postMessage(data, '*');
            window.postMessage(data, '*');
        }

        window.onload = () => {
            if (mode === 'GOOGLE') {
                sendPulse({
                    type: 'AXALITH_GOOGLE_SUCCESS',
                    value: 1,
                    userName: params.get('name'),
                    userPhoto: params.get('photo'),
                    uid: params.get('uid')
                });
            } else if (mode === 'SCRATCH') {
                // 拡張機能側のScratch Authハットブロックを起動させる
                sendPulse({ type: 'AXALITH_PULSE', label: 'START_SCRATCH_AUTH' });
            }
        };
    </script>
</body>
</html>
