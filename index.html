<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
            --scratch-orange: #ffab19;
            --text-color: #ffffff;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0a192f 0%, #02060c 100%);
            font-family: 'Inter', sans-serif; color: var(--text-color); overflow: hidden;
        }

        .crystal-panel {
            background: var(--glass-bg); backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 40px; width: 360px; text-align: center;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.7);
        }

        .logo-container img {
            width: 130px; height: auto; margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        h1 { font-size: 1.6rem; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 30px; letter-spacing: 0.5px; }

        .auth-btn {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: none; border-radius: 14px; cursor: pointer;
            font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .btn-google { background: #ffffff; color: #1a1a1a; }
        .btn-scratch { background: var(--scratch-orange); color: #fff; display: none; }
        .btn-logout { background: rgba(255, 77, 77, 0.15); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); display: none; margin-top: 10px; }

        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--neon-blue); display: none; margin: 0 auto 15px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
    </style>
</head>
<body>

    <div class="crystal-panel">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/AzumoAurora3032/Axalith-Cloud/main/logo.png" alt="Axalith Logo" id="app-logo">
        </div>

        <h1 id="display-name">AXALITH CLOUD</h1>
        <p id="display-status">Next-Gen Digital Infrastructure</p>

        <img src="" id="user-photo" class="profile-img">
        
        <button class="auth-btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Googleで接続
        </button>

        <button class="auth-btn btn-scratch" id="scratch-auth">
            Scratchアカウントを連携
        </button>
        
        <button class="auth-btn btn-logout" id="logout-btn">ログアウト</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.min.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.min.js";

        // 代表から提供いただいた最強のConfig
        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c",
            measurementId: "G-76RMP31JB7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const googleBtn = document.getElementById('google-login');
        const scratchBtn = document.getElementById('scratch-auth');
        const logoutBtn = document.getElementById('logout-btn');
        const userPhoto = document.getElementById('user-photo');
        const displayName = document.getElementById('display-name');
        const displayStatus = document.getElementById('display-status');

        // --- Googleログイン ---
        googleBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Auth Error:", error);
                alert("接続に失敗しました。コンソールを確認してください。");
            }
        });

        // --- 状態監視 ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                googleBtn.style.display = 'none';
                scratchBtn.style.display = 'flex';
                logoutBtn.style.display = 'flex';
                userPhoto.style.display = 'block';
                userPhoto.src = user.photoURL;
                displayName.innerText = user.displayName;
                displayStatus.innerText = "Authorized Representative";
            } else {
                googleBtn.style.display = 'flex';
                scratchBtn.style.display = 'none';
                logoutBtn.style.display = 'none';
                userPhoto.style.display = 'none';
                displayName.innerText = "AXALITH CLOUD";
                displayStatus.innerText = "Next-Gen Digital Infrastructure";
            }
        });

        // --- Scratch Auth ---
        scratchBtn.onclick = () => {
            const redirectUrl = btoa(window.location.href.split('?')[0]);
            window.location.href = `https://auth.itinerary.is/auth/?redirect=${redirectUrl}`;
        };

        // --- URLパラメータ（Scratch Auth戻り） ---
        const urlParams = new URLSearchParams(window.location.search);
        const privateCode = urlParams.get('privateCode');
        if (privateCode) {
            window.history.replaceState({}, document.title, window.location.pathname);
            alert("Scratch連携コードを承認しました。\nCode: " + privateCode);
        }

        // --- ログアウト ---
        logoutBtn.onclick = () => signOut(auth);
    </script>
</body>
</html>
