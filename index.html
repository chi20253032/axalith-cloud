<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith Cloud - Portal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid rgba(0, 242, 255, 0.4); padding: 50px; border-radius: 20px; background: rgba(0, 242, 255, 0.05); backdrop-filter: blur(20px); text-align: center; }
        button { background: #00f2ff; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { box-shadow: 0 0 20px #00f2ff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>AXALITH CLOUD</h1>
        <button id="auth-btn">CONNECT SYSTEM</button>
    </div>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud"
        });

        document.getElementById('auth-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                const u = result.user;
                // ダッシュボードへUID等を送信
                window.location.href = `dashboard.html?uid=${u.uid}&name=${encodeURIComponent(u.displayName)}&photo=${encodeURIComponent(u.photoURL)}&email=${encodeURIComponent(u.email)}`;
            });
        };
    </script>
</body>
</html>
