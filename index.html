<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud | Bridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.2);
            --scratch-color: #ffab19;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000;
            font-family: 'Inter', 'Noto Sans JP', sans-serif; color: white; overflow: hidden;
        }

        .container {
            width: 320px; padding: 40px;
            background: var(--glass); backdrop-filter: blur(40px) saturate(210%);
            -webkit-backdrop-filter: blur(40px) saturate(210%);
            border: 1px solid var(--border); border-radius: 32px;
            text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .logo-area img { 
            width: 120px; height: auto; margin-bottom: 20px; 
            filter: drop-shadow(0 0 15px var(--neon-cyan)); 
        }
        
        h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .subtitle { font-size: 0.7rem; opacity: 0.5; margin-bottom: 30px; letter-spacing: 1px; }

        .btn {
            width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase;
        }

        .btn-google { background: #fff; color: #000; }
        .btn-scratch { background: var(--scratch-color); color: white; }
        
        #status-msg { margin-top: 15px; font-size: 0.8rem; color: var(--neon-cyan); min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png" alt="Axalith Logo" onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/master/logo.png'">
        </div>

        <h1>AXALITH CLOUD</h1>
        <p class="subtitle">AUTHENTICATION BRIDGE</p>

        <button class="btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Googleでサインイン
        </button>

        <button class="btn btn-scratch" id="scratch-auth">
            Scratch Authを呼び出す
        </button>
        
        <p id="status-msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://cdn.skypack.dev/firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://cdn.skypack.dev/firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusMsg = document.getElementById('status-msg');

        // --- 1. Googleログイン: 成功後データを送って閉じる ---
        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                statusMsg.innerText = "Google認証完了。データを送信中...";

                // PenguinModへデータ送信（メッセージイベント）
                if (window.parent || window.opener) {
                    const target = window.opener || window.parent;
                    target.postMessage({
                        type: 'AXALITH_GOOGLE_LOGIN',
                        userName: user.displayName,
                        userEmail: user.email,
                        userPhoto: user.photoURL
                    }, "*");
                }

                // 完了後、1秒でウィンドウを閉じる
                setTimeout(() => {
                    if (window.opener) window.close();
                    statusMsg.innerText = "完了。タブを閉じてください。";
                }, 1000);

            } catch (e) {
                statusMsg.innerText = "エラー: " + e.message;
            }
        };

        // --- 2. Scratch Auth: 0.5秒間だけ信号を1にする ---
        document.getElementById('scratch-auth').onclick = () => {
            statusMsg.innerText = "Auth呼び出し信号を送信中...";
            
            // PenguinModへ「Auth呼び出し信号 = 1」を送信
            const sendSignal = (val) => {
                const target = window.opener || window.parent;
                if (target) {
                    target.postMessage({
                        type: 'AXALITH_AUTH_SIGNAL',
                        value: val
                    }, "*");
                }
            };

            // 信号を 1 にする
            sendSignal(1);

            // 0.5秒後に 0 に戻す
            setTimeout(() => {
                sendSignal(0);
                statusMsg.innerText = "信号リセット。Scratch側を確認中...";
            }, 500);
        };
    </script>
</body>
</html>
