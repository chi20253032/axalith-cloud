<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith Cloud - Dual Auth Gate</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --main: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--main); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .container { display: flex; align-items: center; justify-content: center; height: 100vh; transition: 1s cubic-bezier(0.7, 0, 0.3, 1); }
        .fade-out { opacity: 0; transform: scale(1.1) filter(blur(20px)); }
        
        .glass-card {
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(30px);
            padding: 50px 80px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        h1 { font-weight: 100; letter-spacing: 12px; font-size: 2.8rem; margin-bottom: 40px; text-shadow: 0 0 20px var(--main); }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        button {
            background: transparent; color: var(--main); border: 1px solid var(--main);
            padding: 18px 40px; border-radius: 15px; font-weight: 900; cursor: pointer;
            transition: 0.3s; letter-spacing: 2px;
        }
        button:hover { background: var(--main); color: #000; box-shadow: 0 0 40px var(--main); }

        #status-info { margin-top: 25px; font-size: 0.8rem; opacity: 0.7; }
        .dashboard-ui { display: none; font-size: 1.5rem; letter-spacing: 5px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container" id="gate-ui">
        <div class="glass-card">
            <h1 id="title">AXALITH CLOUD</h1>
            
            <div id="login-ui" class="btn-group">
                <button id="google-btn">GOOGLE LOGIN</button>
                <button id="scratch-btn">SCRATCH AUTH</button>
            </div>

            <div id="dash-ui" class="dashboard-ui">
                CORE SYSTEM ACTIVE
            </div>

            <div id="status-info">INITIALIZING...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c",
            measurementId: "G-76RMP31JB7"
        };
        firebase.initializeApp(firebaseConfig);

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');

        const navigate = (newParams) => {
            document.getElementById('gate-ui').classList.add('fade-out');
            setTimeout(() => {
                window.location.search = new URLSearchParams(newParams).toString();
            }, 800);
        };

        // --- 初期表示切り替え ---
        if (mode) {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('dash-ui').style.display = 'block';
            document.getElementById('title').innerText = "AXALITH DASHBOARD";
            document.getElementById('status-info').innerText = `USER: ${params.get('name') || params.get('user')}`;
            
            // 拡張機能へ最終認証パルスを自動送信
            window.parent.postMessage({
                type: 'AXALITH_AUTH_FINAL',
                authType: mode,
                uid: params.get('uid'),
                name: params.get('name'),
                user: params.get('user')
            }, '*');
        } else {
            document.getElementById('status-info').innerText = "WAITING FOR AUTHENTICATION...";
        }

        // --- Googleログイン ---
        document.getElementById('google-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((r) => {
                navigate({ mode: 'GOOGLE', uid: r.user.uid, name: r.user.displayName });
            });
        };

        // --- Scratch Auth (パルス発信) ---
        document.getElementById('scratch-btn').onclick = () => {
            window.parent.postMessage({ type: 'AXALITH_PULSE', label: 'TRIGGER_SCRATCH_AUTH' }, '*');
        };

        // --- 拡張機能からのScratch Auth成功通知を受信 ---
        window.addEventListener('message', (e) => {
            if (e.data.type === 'NAVIGATE_DASHBOARD') {
                navigate({ mode: 'SCRATCH', user: e.data.user });
            }
        });
    </script>
</body>
</html>
