<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axalith Cloud Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; margin: 0; }
        
        /* アニメーション背景 */
        .bg-blob {
            position: fixed; width: 120vw; height: 120vw; top: -10vw; left: -10vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.08), transparent 60%);
            z-index: -1; animation: float 20s infinite alternate ease-in-out;
        }
        @keyframes float { from { transform: translate(-10%, -10%) scale(1); } to { transform: translate(10%, 10%) scale(1.1); } }

        /* Liquid Glass コンポーネント */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .glass-card:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,242,255,0.1); }

        /* フェードインアニメーション */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* ボタンアクション */
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 flex flex-col items-center">
    <div class="bg-blob"></div>

    <header class="w-full max-w-5xl flex justify-between items-center mb-10 fade-in" style="animation-delay: 0.1s;">
        <div class="flex items-center gap-4">
            <img src="./logo.png" class="w-12 h-12 drop-shadow-[0_0_10px_rgba(0,242,255,0.6)]" onerror="this.src='https://raw.githubusercontent.com/chi20253032/Axalith-Cloud/main/logo.png'">
            <div>
                <h1 class="text-2xl font-black tracking-tight">Axalith Cloud</h1>
                <p class="text-[10px] text-cyan-400 tracking-widest uppercase">Dashboard Module</p>
            </div>
        </div>
        <button id="logout-btn" class="btn-press bg-red-500/20 text-red-400 border border-red-500/50 px-5 py-2 rounded-full font-bold text-sm hover:bg-red-500 hover:text-white transition-all">
            システムから切断
        </button>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <section class="glass-card p-8 md:col-span-2 fade-in flex flex-col justify-center" style="animation-delay: 0.2s;">
            <h2 class="text-sm text-gray-400 font-bold mb-6 tracking-wider uppercase">Active Profile</h2>
            <div class="flex items-center gap-6">
                <img id="profile-icon" src="https://ui-avatars.com/api/?name=Guest&background=0D8ABC&color=fff" class="w-24 h-24 rounded-3xl border-2 border-cyan-400/50 shadow-[0_0_20px_rgba(0,242,255,0.3)] object-cover">
                <div>
                    <h3 id="profile-name" class="text-4xl font-black mb-1">Loading...</h3>
                    <p id="profile-uid" class="text-sm text-gray-400 font-mono">ID: Verifying...</p>
                    <div id="active-badges" class="flex gap-2 mt-4">
                        </div>
                </div>
            </div>
        </section>

        <section class="glass-card p-8 fade-in flex flex-col justify-between" style="animation-delay: 0.3s;">
            <div>
                <h2 class="text-sm text-gray-400 font-bold mb-4 tracking-wider uppercase">System Status</h2>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_rgba(0,242,255,1)]"></div>
                    <span class="font-bold text-lg">Hyper-Bridge Online</span>
                </div>
                <p class="text-xs text-gray-500">Gateway v2.7 Active</p>
            </div>
            <div class="mt-6 p-4 rounded-2xl bg-black/30 border border-white/5">
                <p class="text-[10px] text-gray-400 mb-1">Ping</p>
                <p class="text-xl font-mono text-cyan-300">12ms</p>
            </div>
        </section>

        <section class="glass-card p-8 md:col-span-3 fade-in" style="animation-delay: 0.4s;">
            <h2 class="text-sm text-gray-400 font-bold mb-6 tracking-wider uppercase">Account Linkage</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div id="panel-google" class="p-5 rounded-2xl bg-white/5 border border-white/10 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <div>
                            <h3 class="font-bold">Google Auth</h3>
                            <p id="google-status-text" class="text-xs text-gray-400">Not Linked</p>
                        </div>
                    </div>
                    <button id="link-google-btn" class="btn-press bg-white text-black px-4 py-2 rounded-xl text-sm font-bold hover:bg-gray-200 transition-colors">
                        連携する
                    </button>
                </div>

                <div id="panel-scratch" class="p-5 rounded-2xl bg-white/5 border border-white/10 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="https://scratch.mit.edu/favicon.ico" class="w-6 h-6 rounded-md">
                        <div>
                            <h3 class="font-bold">Scratch Auth</h3>
                            <p id="scratch-status-text" class="text-xs text-gray-400">Not Linked</p>
                        </div>
                    </div>
                    <button id="link-scratch-btn" class="btn-press bg-[#4d97ff] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-[#3d87ef] transition-colors">
                        連携する
                    </button>
                </div>

            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase 初期化
        const firebaseConfig = {
            apiKey: "AIzaSyCsYEUq7FbMiLkNxN6GM6LjRWAo_VvpJ_c",
            authDomain: "axalith-cloud.firebaseapp.com",
            projectId: "axalith-cloud",
            storageBucket: "axalith-cloud.firebasestorage.app",
            messagingSenderId: "938510930021",
            appId: "1:938510930021:web:6037bbedd87519f55db68c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // UI 要素の取得
        const profileName = document.getElementById('profile-name');
        const profileUid = document.getElementById('profile-uid');
        const profileIcon = document.getElementById('profile-icon');
        const badgesContainer = document.getElementById('active-badges');
        
        const googleStatusText = document.getElementById('google-status-text');
        const linkGoogleBtn = document.getElementById('link-google-btn');
        const scratchStatusText = document.getElementById('scratch-status-text');
        const linkScratchBtn = document.getElementById('link-scratch-btn');

        // ダッシュボードのUIを更新する関数（すべてのアクションがここを通る）
        const updateUI = (googleUser, scratchUser) => {
            badgesContainer.innerHTML = ""; // バッジリセット

            // プロフィール情報の決定（Google優先、無ければScratch）
            if (googleUser) {
                profileName.innerText = googleUser.displayName;
                profileUid.innerText = "UID: " + googleUser.uid.substring(0, 12) + "...";
                profileIcon.src = googleUser.photoURL;
            } else if (scratchUser) {
                profileName.innerText = scratchUser;
                profileUid.innerText = "Scratch ID Active";
                profileIcon.src = `https://ui-avatars.com/api/?name=${scratchUser}&background=4d97ff&color=fff`;
            } else {
                // 両方連携解除された場合、index.htmlへ強制送還
                window.location.href = 'index.html';
                return;
            }

            // Google 連携ボタンの状態
            if (googleUser) {
                googleStatusText.innerText = "Linked: " + googleUser.email;
                googleStatusText.classList.replace('text-gray-400', 'text-green-400');
                linkGoogleBtn.innerText = "連携済み";
                linkGoogleBtn.classList.replace('bg-white', 'bg-green-500/20');
                linkGoogleBtn.classList.replace('text-black', 'text-green-400');
                linkGoogleBtn.disabled = true;
                
                // Googleバッジ追加
                badgesContainer.innerHTML += `<span class="px-2 py-1 bg-green-500/20 text-green-400 text-[10px] rounded-md font-bold uppercase border border-green-500/30">Google Active</span>`;
            }

            // Scratch 連携ボタンの状態
            if (scratchUser) {
                scratchStatusText.innerText = "Linked: " + scratchUser;
                scratchStatusText.classList.replace('text-gray-400', 'text-[#4d97ff]');
                linkScratchBtn.innerText = "連携済み";
                linkScratchBtn.classList.replace('bg-[#4d97ff]', 'bg-blue-500/20');
                linkScratchBtn.classList.replace('text-white', 'text-[#4d97ff]');
                linkScratchBtn.disabled = true;

                // Scratchバッジ追加
                badgesContainer.innerHTML += `<span class="px-2 py-1 bg-blue-500/20 text-[#4d97ff] text-[10px] rounded-md font-bold uppercase border border-blue-500/30">Scratch Active</span>`;
            }
        };

        // 起動時のステータス監視
        onAuthStateChanged(auth, (googleUser) => {
            const scratchUser = localStorage.getItem('axalith_scratch_user');
            updateUI(googleUser, scratchUser);
        });

        // ================= アクション群（絶対に動作する） =================

        // 1. 後からGoogleを連携するボタン
        linkGoogleBtn.onclick = async () => {
            try {
                linkGoogleBtn.innerText = "通信中...";
                await signInWithPopup(auth, provider);
                // 成功すると onAuthStateChanged が自動的に発火してUIが更新されます
            } catch (err) {
                console.error(err);
                linkGoogleBtn.innerText = "エラー発生";
            }
        };

        // 2. 後からScratch Authを連携するボタン
        linkScratchBtn.onclick = () => {
            linkScratchBtn.innerText = "通信中...";
            // 実際の Scratch Auth の通信をシミュレート（0.8秒後に連携完了）
            setTimeout(() => {
                localStorage.setItem('axalith_scratch_user', 'AzumoAurora3032');
                const googleUser = auth.currentUser;
                updateUI(googleUser, localStorage.getItem('axalith_scratch_user'));
                
                // OS側へ連携完了のパルスを発射
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: "AXALITH_AUTH_SIGNAL", value: 1 }, "*");
                }
            }, 800);
        };

        // 3. ログアウト（切断）ボタン
        document.getElementById('logout-btn').onclick = async () => {
            document.body.style.transition = "opacity 0.5s";
            document.body.style.opacity = "0";
            
            // GoogleとScratchの両方のデータを破棄
            await signOut(auth);
            localStorage.removeItem('axalith_scratch_user');
            localStorage.removeItem('axalith_auth_method');
            
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        };
    </script>
</body>
</html>
