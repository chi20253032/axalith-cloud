<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Axalith OS Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { border: none; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <iframe id="pm-iframe" src="https://penguinmod.com/player?url=YOUR_PROJECT_URL_HERE&ext=true"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userData = {
            type: 'AXALITH_GOOGLE_SUCCESS',
            value: 1,
            uid: urlParams.get('uid'),
            userName: urlParams.get('name'),
            userPhoto: urlParams.get('photo'),
            isLinked: urlParams.get('linked') === 'true'
        };

        const iframe = document.getElementById('pm-iframe');
        iframe.onload = () => {
            // PenguinMod側へ認証情報をパルスとして送信
            setTimeout(() => {
                iframe.contentWindow.postMessage(userData, '*');
                console.log("Axalith: Sent credentials to PenguinMod.");
            }, 2000); // 起動待ち
        };
    </script>
</body>
</html>
